<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Возможные мероприятия</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2 style="text-align:center; color:#f39c12; margin:40px 0;">Возможные мероприятия</h2>
<div class="cards-container">
  <div class="card" data-event="Корпоратив">
    <div class="card-inner">
      <div class="card-front"></div>
      <div class="card-back">
        <p>Корпоратив</p>
        <div class="suits">♠ ♥ ♣ ♦</div>
      </div>
    </div>
  </div>

  <div class="card" data-event="Свадьба">
    <div class="card-inner">
      <div class="card-front"></div>
      <div class="card-back">
        <p>Свадьба</p>
        <div class="suits">♠ ♥ ♣ ♦</div>
      </div>
    </div>
  </div>

  <div class="card" data-event="Юбилей">
    <div class="card-inner">
      <div class="card-front"></div>
      <div class="card-back">
        <p>Юбилей</p>
        <div class="suits">♠ ♥ ♣ ♦</div>
      </div>
    </div>
  </div>

  <div class="card" data-event="Детское мероприятие">
    <div class="card-inner">
      <div class="card-front"></div>
      <div class="card-back">
        <p>Детское мероприятие</p>
        <div class="suits">♠ ♥ ♣ ♦</div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
